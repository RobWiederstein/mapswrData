url: https://robwiederstein.github.io/mapswrData/

home:
  title: Maps with R Data

authors:
  Rob Wiederstein:
    href: https://robwiederstein.org


template:
  bslib:
    version: 5
    bootswatch: sandstone
    base_font: {google: "Atkinson Hyperlegible"}
    code_font: {google: "Roboto Mono"}
    border-radius: 0.5rem
    btn-border-radius: 0.25rem
    font-size-base: 1.1rem

development:
  mode: auto

reference:
  - title: Datasets
    desc: These datasets for the website "Making Maps with R." These datasets have a spatial/location component to them in that they can be located on a map. These objects are either of `sf` class or can be converted to it.

  - title: Polygons
    contents:
    - atlanta

  - title: Lines
    contents:
    - blue_riband
    - flights
    - white_shark

  - title: Points

